services:
  postgres:
    image: postgres:16-alpine
    container_name: counter-postgres
    environment:
      POSTGRES_DB: counter_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: counter-backend
    environment:
      ConnectionStrings__Default: Host=postgres;Port=5432;Database=counter_db;Username=postgres;Password=postgres
    depends_on:
      - postgres
    ports:
      - "4002:4002"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4002
    container_name: counter-frontend
    depends_on:
      - backend
    ports:
      - "4001:4001"

volumes:
  postgres_data:
